services:
  postgres:
    image: postgres:16-alpine
    container_name: market-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-market_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-market}
    ports:
      # Bind only to the Tailscale interface, never to 0.0.0.0.
      - "${BIND_ADDRESS:-127.0.0.1}:5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-market_app} -d ${POSTGRES_DB:-market}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_prod_data:
